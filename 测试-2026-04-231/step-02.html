<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
body { margin:0; background:#eef2f7; font-family:'Microsoft YaHei', Arial, sans-serif; color:#0f172a; }
.wrap { width: 1180px; min-height: 760px; padding: 36px; box-sizing:border-box; }
.card { background:#fff; border:1px solid #d9e2ef; border-radius:18px; box-shadow:0 10px 30px rgba(15,23,42,.08); padding:24px 28px 28px 28px; position:relative; }
.card:before { content:''; position:absolute; left:0; top:0; bottom:0; width:6px; border-radius:18px 0 0 18px; background:#2563eb; }
.head { display:flex; align-items:flex-start; gap:14px; border-bottom:1px solid #e2e8f0; padding-bottom:16px; margin-bottom:18px; }
.badge { background:#020617; color:#fff; border-radius:999px; padding:7px 10px; font-size:14px; font-weight:800; }
h1 { font-size:24px; line-height:1.2; margin:0; }
.subtitle { color:#64748b; font-size:13px; margin-top:6px; }
.status { margin-left:auto; border-radius:999px; padding:7px 11px; font-size:12px; font-weight:800; border:1px solid #dbe3ef; }
.status.ok { color:#047857; background:#ecfdf5; border-color:#a7f3d0; }
.status.warn { color:#92400e; background:#fffbeb; border-color:#fde68a; }
.status.fail { color:#be123c; background:#fff1f2; border-color:#fecdd3; }
.row { display:grid; grid-template-columns:150px 1fr; gap:18px; padding:9px 0; border-bottom:1px dashed #e2e8f0; }
.label { color:#64748b; font-size:14px; font-weight:800; }
.value { color:#1e293b; font-size:14px; line-height:1.65; white-space:pre-wrap; }
.notes { margin:18px 0 0 0; padding:14px 18px 14px 34px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; color:#475569; font-size:13px; line-height:1.7; }
.foot { color:#94a3b8; font-size:12px; margin-top:16px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="head">
      <div class="badge">02</div>
      <div><h1>强信号扫描 Fast-Track</h1><div class="subtitle">旁路规则先行识别风险、报价、时间等强信号</div></div>
      <div class="status ok">actual</div>
    </div>
    <div class='row'><div class='label'>扫描范围:</div><div class='value'>最近 15 句，本次 4 句</div></div><div class='row'><div class='label'>命中信号:</div><div class='value'>价格/比价、财务/结算、合规/文件</div></div><div class='row'><div class='label'>后续影响:</div><div class='value'>作为 LLM-2 输入信号参与回复策略</div></div>

    <div class="foot">测试时间：2026-04-23T12:35:31；测试目录：测试-2026-04-23</div>
  </div>
</div>
</body>
</html>
