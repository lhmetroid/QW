<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 销售辅助看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f1f5f9; }
        .session-item.active-session { background-color: #ffffff; border-left: 4px solid #3b82f6; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .msg-customer { background: #ffffff; border-radius: 0 16px 16px 16px; border: 1px solid #e2e8f0; }
        .msg-sales { background: #dcf8c6; border-radius: 16px 0 16px 16px; margin-left: auto; }
        .msg-system { background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 12px; margin: 0 auto; text-align: center; width: fit-content; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex text-slate-800 overflow-hidden">

    <!-- 侧边栏 -->
    <div class="w-80 border-r bg-slate-50 flex flex-col">
        <div class="p-4 border-b bg-white flex flex-col space-y-3">
            <div class="flex justify-between items-center">
                <h1 class="font-bold text-lg text-slate-700">企微实时智能</h1>
                <div class="flex space-x-2">
                    <button onclick="openKnowledgeAdmin()" class="text-[10px] bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded text-emerald-700 hover:bg-emerald-100">知识库</button>
                    <button onclick="openSettings()" class="text-[10px] bg-slate-100 border border-slate-200 px-2 py-0.5 rounded text-slate-600 hover:bg-slate-200">⚙️ 引擎配置</button>
                    <button onclick="seedData()" class="text-[10px] text-blue-500 hover:text-blue-700"> 重置 Mock</button>
                </div>
            </div>
            
            <button id="sync-btn" onclick="syncRealData()" class="w-full py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold rounded-lg shadow-sm transition-all flex items-center justify-center space-x-2">
                <svg id="sync-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <span>同步今日真实记录</span>
            </button>
            
            <!-- 精度状态条 V1.4.25 -->
            <div id="sync-status-box" class="mt-2 bg-slate-50 p-2 rounded-lg border border-slate-100 hidden">
                <div class="flex justify-between text-[10px] text-slate-500 mb-1 font-bold">
                    <span id="sync-phase-text">准备中...</span>
                    <span id="sync-percent">0%</span>
                </div>
                <div class="w-full bg-slate-200 h-1 rounded-full overflow-hidden">
                    <div id="sync-progress-bar" class="bg-emerald-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>
        <div id="session-list" class="flex-1 overflow-y-auto p-2 space-y-1">
            <!-- Loading -->
        </div>
    </div>

    <!-- 中间对话区 -->
    <div class="flex-1 flex flex-col bg-white">
        <div class="h-16 border-b flex items-center px-6 justify-between bg-white/80 backdrop-blur">
            <div class="flex flex-col">
                <span id="current-user-title" class="font-bold text-slate-700">等待选择会话</span>
                <span id="status-text" class="text-[10px] text-slate-400">选择左侧列表开启实时意图扫描</span>
            </div>
            <div id="status-badge" class="px-3 py-1 rounded-full text-[10px] font-bold hidden"></div>
        </div>
        
        <div id="msg-container" class="flex-1 p-6 overflow-y-auto space-y-4 bg-slate-50/30">
            <!-- 消息流 -->
        </div>
    </div>

    <!-- 右侧分析区 (Premium 回正) -->
    <div class="w-1/4 border-l bg-white flex flex-col p-6 overflow-y-auto space-y-6">
        <div class="flex items-center space-x-2 pb-2 border-b">
            <div class="w-1 h-4 bg-blue-600 rounded"></div>
            <h2 class="font-bold text-slate-700 uppercase tracking-wider text-sm">AI 结构化特征 (V1)</h2>
        </div>

        <div id="analysis-content" class="space-y-6">
            <!-- 详尽特征展示 -->
            <div class="text-center py-20 text-slate-300 text-xs italic">
                点击会话查看详细 Schema V1 特征
            </div>
        </div>

        <div class="mt-auto pt-6 border-t">
             <div class="bg-amber-50 rounded-xl p-4 border border-amber-100 shadow-sm">
                <div class="flex items-center text-amber-800 font-bold text-xs mb-2">
                    <span class="mr-2">💡</span> AI 实时建议 (LLM-2)
                </div>
                <div id="assist-content" class="text-xs text-amber-900 leading-relaxed italic">
                    监控中...
                </div>
             </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        function getDisplayName(userId) {
            const maps = {
                "case_price_conflict": "💼 报价谈判: 折扣异议",
                "group_after_sales_998": "🛠️ 物流损毁: 售后赔付",
                "case_tech_consult": "🧪 规格确认: 线缆定制",
                "System_Archive_Status": "⚡ 存档同步激活桩"
            };
            if(maps[userId]) return maps[userId];
            
            if(userId.startsWith('group_')) {
                return `👥 企微群聊 (群号 ${userId.substring(6, 12).toUpperCase()})`;
            }
            if(userId.startsWith('single_')) {
                const arr = userId.replace('single_','').split('_');
                // 通过前缀区分内外角色
                let intl = arr.find(x => !x.startsWith('wm') && !x.startsWith('wo') && !x.startsWith('wb')) || '员工';
                let extl = arr.find(x => x.startsWith('wm') || x.startsWith('wo') || x.startsWith('wb')) || '客户';
                
                // 为了消除长串乱码感，进行高雅截断
                if(intl.length > 8) intl = intl.substring(0, 5) + '..';
                const exStr = extl.length > 5 ? extl.substring(extl.length - 4) : extl;
                return `👤 员工(${intl}) 与 客户(*${exStr})`;
            }
            return `👤 企微对话: ${userId.substring(0,8)}...`;
        }

        async function fetchSessions() {
            const res = await fetch(`${API_BASE}/api/sessions`);
            const data = await res.json();
            const list = document.getElementById('session-list');
            list.innerHTML = data.map(s => `
                <div onclick="selectSession('${s.user_id}', ${s.is_mock})" class="p-3 mb-1 rounded-lg cursor-pointer transition session-item hover:bg-white border border-transparent" id="session-${s.user_id}">
                    <div class="flex items-center justify-between pointer-events-none">
                        <span class="font-semibold text-xs text-slate-600 truncate">${getDisplayName(s.user_id)}</span>
                        ${s.is_mock ? '<span class="text-[7px] bg-slate-200 text-slate-500 px-1 rounded font-bold">MOCK</span>' : '<span class="text-[7px] bg-emerald-500 text-white px-1 rounded font-bold animate-pulse">LIVE</span>'}
                    </div>
                    <div class="text-[9px] text-slate-400 mt-1 pointer-events-none">${new Date(s.last_msg).toLocaleTimeString()} · 已扫描完毕</div>
                </div>
            `).join('');
        }

        function formatDateTime(dateStr) {
            const d = new Date(dateStr);
            const mm = (d.getMonth() + 1).toString().padStart(2, '0');
            const dd = d.getDate().toString().padStart(2, '0');
            const hh = d.getHours().toString().padStart(2, '0');
            const mi = d.getMinutes().toString().padStart(2, '0');
            const ss = d.getSeconds().toString().padStart(2, '0');
            return `${mm}月${dd}日 ${hh}:${mi}:${ss}`;
        }

        async function selectSession(userId, isMock) {
            document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active-session'));
            const target = document.getElementById(`session-${userId}`);
            if(target) target.classList.add('active-session');
            document.getElementById('current-user-title').innerText = getDisplayName(userId);

            const msgRes = await fetch(`${API_BASE}/api/sessions/${userId}/messages`);
            const msgs = await msgRes.json();
            const container = document.getElementById('msg-container');
            container.innerHTML = msgs.map(m => `
                <div class="max-w-[85%] mb-4 p-4 ${m.sender === 'customer' ? 'msg-customer' : (m.sender==='system' ? 'msg-system px-4 py-1 text-xs' : 'msg-sales')}">
                    ${m.sender !== 'system' ? `<div class="text-[9px] text-slate-400 mb-2 font-bold uppercase">${m.sender === 'customer' ? '客户' : '我方营销'} · ${formatDateTime(m.time)}</div>` : ''}
                    <div class="text-[13px] leading-relaxed">${m.content}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
            loadAnalysis(userId);
        }

        function gracefulStr(val) {
            if (!val || val === '未明确') return '--未明确--';
            try {
                let parsed = typeof val === 'string' ? JSON.parse(val) : val;
                if (Array.isArray(parsed)) return parsed.join('、');
                if (typeof parsed === 'object') return Object.entries(parsed).map(([k,v]) => `${k}: ${v}`).join('、');
                return String(parsed);
            } catch(e) {
                return String(val).replace(/[\[\]"]/g, '');
            }
        }

        function renderKeyFacts(facts) {
            if (!facts) return '<span class="text-[10px] text-slate-400 italic">暂无明确实事</span>';
            if (typeof facts === 'object' && !Array.isArray(facts)) {
                facts = Object.entries(facts).filter(([k, v]) => v && v !== '未明确' && v !== '无').map(([k, v]) => `${k}: ${v}`);
            } else if (!Array.isArray(facts)) {
                facts = [facts];
            }
            if (facts.length === 0) return '<span class="text-[10px] text-slate-400 italic">暂无明确实事</span>';
            return facts.map(f => `<span class="bg-indigo-100 text-indigo-700 text-[9px] px-2 py-0.5 rounded-md font-medium border border-indigo-200">${f}</span>`).join('');
        }

        async function loadAnalysis(userId) {
            const res = await fetch(`${API_BASE}/api/sessions/${userId}/analysis`);
            const data= await res.json() || { fast_track: [], has_v1: false, has_v2: false };
            const area = document.getElementById('analysis-content');
            const badge = document.getElementById('status-badge');

            badge.innerText = data.has_v1 ? (data.status || "特征就绪") : "等待指令";
            badge.className = data.has_v1 ? "px-3 py-1 rounded-full text-[10px] font-bold bg-blue-100 text-blue-700 block" : "px-3 py-1 rounded-full text-[10px] font-bold bg-slate-100 text-slate-500 block";
            
            // 为了保持右下角不出戏，原先那个单独的小辅助面板干脆隐藏掉
            const assistSection = document.getElementById('assist-content');
            if(assistSection) assistSection.parentElement.style.display = 'none';

            let tbc_text = '--待提取--';
            if (data.has_v1) {
                try {
                    tbc_text = typeof data.to_be_confirmed === 'string' ? data.to_be_confirmed : JSON.stringify(data.to_be_confirmed);
                } catch(e) { tbc_text = String(data.to_be_confirmed); }
            }

            area.innerHTML = `
                <div class="grid grid-cols-1 gap-4 pb-10">
                    <!-- 旁路层 Fast-Track -->
                    <div class="p-3 bg-slate-50 border border-slate-200 rounded-xl relative shadow-sm hover:shadow-md transition">
                        <div class="absolute top-0 left-0 w-1 h-full bg-slate-400 rounded-l-xl"></div>
                        <div class="flex justify-between items-center mb-3 ml-2">
                            <div class="font-bold text-[11px] text-slate-600 uppercase tracking-widest">📌 强信号扫描 (Fast-Track)</div>
                            <button onclick="loadAnalysis('${userId}')" class="text-[10px] font-bold text-slate-500 bg-white border border-slate-200 px-2 py-1 rounded hover:bg-slate-100 transition">
                                ↺ 刷新
                            </button>
                        </div>
                        <div class="ml-2 mb-1 flex flex-wrap gap-1">
                            ${(data.fast_track && data.fast_track.length > 0) 
                              ? data.fast_track.map(f => `<span class="bg-slate-200 text-slate-700 px-2 py-0.5 rounded text-[10px] font-bold shadow-sm">${f}</span>`).join('')
                              : '<span class="text-slate-400 text-[10px] italic">近15句暂无旁路拦截信号...</span>'}
                        </div>
                    </div>

                    <!-- 意图层 LLM-1 -->
                    <div class="p-3 bg-indigo-50 border border-indigo-200 rounded-xl relative shadow-sm hover:shadow-md transition">
                        <div class="absolute top-0 left-0 w-1 h-full bg-indigo-500 rounded-l-xl"></div>
                        <div class="font-bold text-[11px] text-indigo-600 mb-3 ml-2 uppercase tracking-widest">⚙️ 第一阶段特征提取 (V1-Dify)</div>
                        <button onclick="triggerLLM('${userId}', 1)" class="w-full ml-1 mb-4 text-xs font-bold text-white bg-indigo-500 hover:bg-indigo-600 border border-indigo-600 py-2 rounded-lg transition shadow-sm flex items-center justify-center gap-2">
                            ${data.has_v1 ? '🔄 重构全量特征 (覆盖当前)' : '▶️ 发起首次网络拓扑提取'}
                        </button>
                        <div class="ml-2 space-y-2 text-xs">
                            <div class="grid grid-cols-[80px_1fr] items-start">
                                <span class="text-indigo-400 font-bold">核心主线:</span> 
                                <span class="font-medium text-slate-700 ${data.has_v1?'':'opacity-40'}">${data.has_v1 ? gracefulStr(data.topic) : '--待构建--'}</span>
                            </div>
                            <div class="grid grid-cols-[80px_1fr] items-start">
                                <span class="text-indigo-400 font-bold">核心诉求:</span> 
                                <span class="font-medium text-slate-700 ${data.has_v1?'':'opacity-40'}">${data.has_v1 ? gracefulStr(data.core_demand) : '--待构建--'}</span>
                            </div>
                            <div class="grid grid-cols-[80px_1fr] items-start">
                                <span class="text-indigo-400 font-bold">关键事实:</span> 
                                <div class="flex flex-wrap gap-1 ${data.has_v1?'':'opacity-40'}">${data.has_v1 ? renderKeyFacts(data.key_facts) : '--待构建--'}</div>
                            </div>
                            <div class="grid grid-cols-[80px_1fr] items-start">
                                <span class="text-rose-400 font-bold">顾虑风险:</span> 
                                <span class="font-bold text-rose-700 ${data.has_v1?'':'opacity-40'}">${data.has_v1 ? gracefulStr(data.risks) : '--待构建--'}</span>
                            </div>
                            <div class="grid grid-cols-[80px_1fr] items-start">
                                <span class="text-amber-500 font-bold">待填大坑:</span> 
                                <span class="font-medium text-amber-800 ${data.has_v1?'':'opacity-40'} break-all">${data.has_v1 ? gracefulStr(tbc_text) : '--待构建--'}</span>
                            </div>
                        </div>
                    </div>

                    <!-- 话术层 LLM-2 -->
                    <div class="p-3 bg-amber-50 border border-amber-200 rounded-xl relative shadow-sm hover:shadow-md transition">
                        <div class="absolute top-0 left-0 w-1 h-full bg-amber-500 rounded-l-xl"></div>
                        <div class="font-bold text-[11px] text-amber-600 mb-3 ml-2 uppercase tracking-widest">💡 第二阶段实战话术 (V2-DeepSeek)</div>
                        <button onclick="triggerLLM('${userId}', 2)" ${data.has_v1 ? '' : 'disabled'} class="w-full ml-1 mb-4 text-xs font-bold ${data.has_v1 ? 'text-white bg-amber-500 hover:bg-amber-600 border border-amber-600 shadow-sm cursor-pointer' : 'text-amber-400 bg-amber-100 border border-amber-200 cursor-not-allowed opacity-70'} py-2 rounded-lg transition flex items-center justify-center gap-2">
                            ${data.has_v2 ? '🔄 重新演算金牌建议 (覆盖当前)' : (data.has_v1 ? '▶️ 立刻调用知识库进行话术辅助生成' : '⛔ 请先完成阶段一特征提取')}
                        </button>
                        <div class="ml-2 text-xs">
                            <div class="flex items-center justify-between mb-1">
                                <span class="text-amber-500 font-bold">AI 建议回复文案与思路:</span>
                                <span class="flex gap-1">
                                    <button onclick='copyText(${JSON.stringify(data.sales_advice_v2 || '')})' class="px-2 py-1 bg-white border rounded text-[10px] text-slate-600">复制</button>
                                    <button onclick="submitAssistFeedback('${userId}', 'useful')" class="px-2 py-1 bg-emerald-50 border border-emerald-200 rounded text-[10px] text-emerald-700">有用</button>
                                    <button onclick="submitAssistFeedback('${userId}', 'needs_fix')" class="px-2 py-1 bg-rose-50 border border-rose-200 rounded text-[10px] text-rose-700">需修正</button>
                                </span>
                            </div>
                            <div class="font-medium text-amber-900 bg-white p-3 rounded-lg border border-amber-100 whitespace-pre-wrap leading-relaxed ${data.has_v2?'':'opacity-40'}">
                                ${data.has_v2 ? data.sales_advice_v2 : '（空，等待大模型推演）'}
                            </div>
                            ${data.knowledge_v2 ? renderAssistEvidence(data.knowledge_v2) : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAssistEvidence(knowledge) {
            const hits = knowledge.hits || [];
            const warning = knowledge.manual_review_required ? '<div class="mt-2 text-[10px] text-rose-700 font-bold">需要人工复核：知识证据不足或命中限制性规则</div>' : '';
            return `
                <details class="mt-3 bg-white border border-amber-100 rounded p-2">
                    <summary class="cursor-pointer text-[10px] font-bold text-slate-500">知识证据 ${safeText(knowledge.status)} · 置信 ${safeText(knowledge.confidence_score)}</summary>
                    ${warning}
                    <div class="mt-2 space-y-2">${hits.length ? hits.map(hit => `
                        <div class="border rounded p-2">
                            <div class="font-bold">${safeText(hit.title)} <span class="text-slate-400">score ${safeText(hit.score)}</span></div>
                            <div class="text-slate-500">${safeText(hit.knowledge_type_label || hit.knowledge_type)} · ${safeText(hit.business_line_label || hit.business_line)} · ${safeText(hit.service_scope_label || hit.service_scope)}</div>
                            <div class="mt-1 line-clamp-3">${safeText(hit.content)}</div>
                        </div>`).join('') : '<div class="text-slate-400">无命中证据</div>'}</div>
                </details>`;
        }

        async function submitAssistFeedback(sessionId, status) {
            const note = status === 'needs_fix' ? prompt('请填写需要修正的原因') : '';
            const res = await fetch(`${API_BASE}/api/assist/feedback`, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({session_id: sessionId, feedback_status: status, manual_feedback: {note: note || '', source: 'frontend_sidebar'}})
            });
            const data = await res.json();
            if (!res.ok) return alert(JSON.stringify(data.detail || data, null, 2));
            if (data.candidate?.candidate_id) {
                alert(`反馈已记录，并已生成候选：${data.candidate.title}`);
            } else {
                alert('反馈已记录');
            }
        }

        async function triggerLLM(userId, step) {
            document.getElementById('analysis-content').innerHTML = `
                <div class="flex flex-col items-center justify-center py-20 text-slate-400">
                    <svg class="animate-spin h-8 w-8 text-indigo-500 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <div class="text-xs font-bold uppercase tracking-widest text-indigo-500 animate-pulse">
                        ⌛ 正在唤起强算力通道 (阶段 ${step})，请稍候...
                    </div>
                </div>
            `;
            try {
                await fetch(`${API_BASE}/api/sessions/${userId}/trigger_llm`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({step: step}) });
            } catch (err) {
                console.error("服务端暂时不可达或重启中:", err);
            } finally {
                setTimeout(() => loadAnalysis(userId), 5500);
            }
        }

        async function syncRealData() {
            const btn = document.getElementById('sync-btn');
            const icon = document.getElementById('sync-icon');
            const statusBox = document.getElementById('sync-status-box');
            const phaseText = document.getElementById('sync-phase-text');
            const progressBar = document.getElementById('sync-progress-bar');
            const percentText = document.getElementById('sync-percent');

            // 1. 初始化视觉
            btn.disabled = true;
            icon.classList.add('animate-spin');
            statusBox.classList.remove('hidden');
            
            async function updateProgress(text, pct) {
                phaseText.innerText = text;
                progressBar.style.width = pct + '%';
                percentText.innerText = pct + '%';
                await new Promise(r => setTimeout(r, 600)); // 平滑过渡
            }

            try {
                await updateProgress('正在建立 SDK 安全通道...', 20);
                await updateProgress('正在握手企微存档中心...', 55);
                
                const res = await fetch(`${API_BASE}/api/sync/today`, {method: 'POST'});
                const data = await res.json();
                
                if(data.status === 'success') {
                    await updateProgress('正在解析加密报文流...', 90);
                    await updateProgress('同步完成', 100);
                    setTimeout(() => {
                        statusBox.classList.add('hidden');
                        fetchSessions();
                    }, 1500);
                } else {
                    alert('同步中遇到障碍: ' + data.msg);
                    statusBox.classList.add('hidden');
                }
            } catch(e) {
                alert('网络链路异常: ' + e);
                statusBox.classList.add('hidden');
            } finally {
                btn.disabled = false;
                icon.classList.remove('animate-spin');
            }
        }

        async function seedData() {
            await fetch(`${API_BASE}/api/test/seed`, {method: 'POST'});
            location.reload();
        }

        async function openSettings() {
            let overlay = document.getElementById('settings-modal');
            if (overlay) return overlay.style.display = 'flex';
            
            overlay = document.createElement('div');
            overlay.id = 'settings-modal';
            overlay.className = 'fixed inset-0 bg-slate-900/50 z-50 flex justify-center items-center';
            document.body.appendChild(overlay);
            
            overlay.innerHTML = `

        function optionTags(dictName, selected = '') {
            const dict = kbState.dictionaries[dictName] || {};
            return `<option value="">全部</option>` + Object.entries(dict).map(([code, label]) =>
                `<option value="${code}" ${code === selected ? 'selected' : ''}>${label}</option>`
            ).join('');

        function safeText(value) {
            if (value === null || value === undefined || value === '') return '-';
            return String(value).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
        }

        function fmtStatus(item) {
            return `<span class="text-[10px] px-2 py-0.5 rounded border bg-slate-50 text-slate-700">${safeText(item.status_label || item.status)}</span>`;

            if (value === null || value === undefined) return '';
            return String(value);
        }

        async function kbDocAction(documentId, action) {
            let options = {method: 'POST'};
            if (action === 'publish') {
                options.headers = {'Content-Type': 'application/json'};
                options.body = JSON.stringify({operator: 'frontend_admin'});
            }
            const res = await fetch(`${API_BASE}/api/kb/documents/${documentId}/${action}`, options);
            const data = await res.json();
            if (!res.ok) {
                const gateReport = data.detail?.gate_report;
                if (action === 'publish' && gateReport) {
                    const reason = prompt(`发布门禁未通过。\n失败用例：${(gateReport.failed_cases || []).map(item => item.case_id).join(', ')}\n请输入强制发布原因：`);
                    if (!reason) return;
                    const forceRes = await fetch(`${API_BASE}/api/kb/documents/${documentId}/publish`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({force: true, force_reason: reason, operator: 'frontend_admin'})
                    });
                    const forceData = await forceRes.json();
                    if (!forceRes.ok) return alert(JSON.stringify(forceData.detail || forceData, null, 2));
                    alert(`已强制发布。\n门禁用例 ${forceData.gate_report?.summary?.selected || 0} 条，失败 ${forceData.gate_report?.summary?.failed || 0} 条。`);
                    await showKbDocument(documentId);
                    if (kbState.tab === 'review') await loadKbReview();
                    if (kbState.tab === 'documents') await refreshKbDocuments();
                    return;
                }
                alert(JSON.stringify(data.detail || data, null, 2));
                return;
            }
            if (action === 'publish' && data.gate_report) {
                alert(`发布通过。\n门禁用例 ${data.gate_report.summary?.selected || 0} 条，失败 ${data.gate_report.summary?.failed || 0} 条。`);
            }
            await showKbDocument(documentId);
            if (kbState.tab === 'review') await loadKbReview();
            if (kbState.tab === 'documents') await refreshKbDocuments();
        }

        async function editKbCandidate(candidateId) {
            const title = prompt('候选标题', '');
            if (title === null) return;
            const content = prompt('候选内容');
            if (content === null) return;
            const res = await fetch(`${API_BASE}/api/kb/candidates/${candidateId}`, {
                method:'PATCH',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({title, content, operator: 'frontend_admin'})
            });
            const data = await res.json();
            if (!res.ok) return alert(JSON.stringify(data.detail || data, null, 2));
            await refreshKbCandidates();
            await showKbCandidate(candidateId);
        }

        async function promoteKbCandidate(candidateId) {
            if (!confirm('确认将该候选转为 draft 知识？')) return;
            const res = await fetch(`${API_BASE}/api/kb/candidates/${candidateId}/promote`, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({operator: 'frontend_admin', owner: 'frontend_admin'})
            });
            const data = await res.json();
            if (!res.ok) return alert(JSON.stringify(data.detail || data, null, 2));
            alert(`已转为草稿知识：${data.document?.title || ''}`);
            await refreshKbCandidates();
            if (data.document?.document_id) {
                kbState.tab = 'documents';
                renderKbTabs();
                await loadKbDocuments();
                await showKbDocument(data.document.document_id);
            }
        }

        async function loadKbTemplateInfo() {
            const res = await fetch(`${API_BASE}/api/kb/import/templates`);
            const data = await res.json();
            const type = document.getElementById('kb-import-type')?.value || 'faq';
            const item = (data.templates || []).find(x => x.type === type);
            if (!item) return;
            document.getElementById('kb-template-info').innerHTML = `当前模板：<b>${safeText(item.label)}</b>，默认知识类型 ${safeText(item.knowledge_type)}，默认切片 ${safeText(item.chunk_type)}。必备列：标题、内容。`;
        }

        async function runKbMessageExtract(sourceType) {
            const sessionId = document.getElementById('kb-extract-session-id')?.value.trim();
            const lines = (document.getElementById('kb-extract-messages')?.value || '')
                .split('\n')
                .map(item => item.trim())
                .filter(Boolean);
            if (!sessionId && !lines.length) return alert('请填写会话 ID 或历史文本');
            const target = document.getElementById('kb-extract-result');
            target.textContent = 'extracting...';
            const res = await fetch(`${API_BASE}/api/kb/extract/from_messages`, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({
                    session_id: sessionId || null,
                    messages: lines.length ? lines : null,
                    source_type: sourceType,
                    owner: 'frontend_extract',
                    operator: 'frontend_extract'
                })
            });
            const data = await res.json();
            target.textContent = JSON.stringify(data, null, 2);
            if (!res.ok) return alert(JSON.stringify(data.detail || data, null, 2));
            if (data.created_count) {
                await loadKbTab('candidates');
            }
        }

        async function runKbEmailExtract() {
            const fileInput = document.getElementById('kb-email-extract-file');
            if (!fileInput.files?.length) return alert('请选择邮件整理文件');
            const target = document.getElementById('kb-extract-result');
            target.textContent = 'extracting...';
            const form = new FormData();
            form.append('file', fileInput.files[0]);
            form.append('owner', 'frontend_extract');
            form.append('operator', 'frontend_extract');
            const res = await fetch(`${API_BASE}/api/kb/extract/from_email_excel`, {method:'POST', body: form});
            const data = await res.json();
            target.textContent = JSON.stringify(data, null, 2);
            if (!res.ok) return alert(JSON.stringify(data.detail || data, null, 2));
            if (data.created_count) {
                await loadKbTab('candidates');
            }
        }

            window.open(`${API_BASE}/api/kb/import/templates/${type}/download`, '_blank');

        function buildKbImportForm() {
            const file = document.getElementById('kb-excel-file').files[0];
            if (!file) return alert('请选择 Excel 文件');
            const form = new FormData();
            form.append('file', file);
            form.append('import_type', document.getElementById('kb-import-type').value);
            return form;

                failed_count: data.failed_count,
                failed: data.failed
            }, null, 2);

            const res = await fetch(`${API_BASE}/api/kb/hit_logs?limit=100&redact=true`);
            const logs = await res.json();
            document.getElementById('kb-body').innerHTML = `
                <div class="h-full overflow-y-auto p-4 bg-slate-50">
                    <div class="bg-white border rounded overflow-hidden">
                        <table class="w-full text-xs">
                            <thead class="bg-slate-100"><tr><th class="text-left p-2">时间</th><th class="text-left p-2">状态</th><th class="text-left p-2">Query</th><th class="text-left p-2">命中</th><th class="text-left p-2">耗时</th><th class="text-left p-2">原因</th><th class="text-left p-2">操作</th></tr></thead>
                            <tbody>${logs.map(log => `<tr class="border-t"><td class="p-2">${safeText(log.created_at)}</td><td class="p-2">${safeText(log.status)}</td><td class="p-2">${safeText(log.query_text)}</td><td class="p-2">${safeText((log.hit_chunk_ids || []).length)}</td><td class="p-2">${safeText(log.latency_ms)}ms</td><td class="p-2">${safeText(log.no_hit_reason)}</td><td class="p-2"><button onclick="createCandidateFromLog('${log.log_id}')" class="text-emerald-700 font-bold">转候选</button></td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>`;
        }

        async function createCandidateFromLog(logId) {
            const note = prompt('补充候选说明（可留空）') || '';
            const res = await fetch(`${API_BASE}/api/kb/candidates/from_feedback`, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({log_id: logId, note, operator: 'frontend_log', owner: 'frontend_log'})
            });
            const data = await res.json();
            if (!res.ok) return alert(JSON.stringify(data.detail || data, null, 2));
            alert(`已生成候选：${data.candidate?.title || ''}`);
            kbState.tab = 'candidates';
            renderKbTabs();
            await loadKbCandidates();
        }

        async function loadKbRetrieveTest() {
            document.getElementById('kb-body').innerHTML = `
                <div class="h-full overflow-y-auto p-4 bg-slate-50">
                    <div class="bg-white border rounded p-4 mb-4">
                        <textarea id="kb-retrieve-query" class="w-full border rounded p-3 text-sm h-24" placeholder="输入客户问题，例如：英译法普通商务资料多少钱？"></textarea>
                        <div class="grid grid-cols-6 gap-2 mt-3">
                            <select id="kb-retrieve-line" class="border rounded p-2 text-xs">${optionTags('business_line', 'translation')}</select>
                            <select id="kb-retrieve-type" class="border rounded p-2 text-xs">${optionTags('knowledge_type')}</select>
                            <select id="kb-retrieve-lang" class="border rounded p-2 text-xs">${optionTags('language_pair')}</select>
                            <select id="kb-retrieve-scope" class="border rounded p-2 text-xs">${optionTags('service_scope')}</select>
                            <input id="kb-retrieve-topk" type="number" value="5" min="1" max="20" class="border rounded p-2 text-xs">
                            <button onclick="runKbRetrieveTest()" class="bg-emerald-600 text-white rounded text-sm">检索</button>
                        </div>
                    </div>
                    <div id="kb-retrieve-result"></div>
                </div>`;
        }

        async function runKbRetrieveTest() {
            const query = document.getElementById('kb-retrieve-query').value;
            if (!query.trim()) return alert('请输入问题');
            const features = {};
            const line = document.getElementById('kb-retrieve-line').value;
            const type = document.getElementById('kb-retrieve-type').value;
            const lang = document.getElementById('kb-retrieve-lang').value;
            const scope = document.getElementById('kb-retrieve-scope').value;
            if (line) features.business_line = line;
            if (type) features.knowledge_type = [type];
            if (lang) features.language_pair = lang;
            if (scope) features.service_scope = scope;
            const topK = parseInt(document.getElementById('kb-retrieve-topk').value || '5', 10);
            document.getElementById('kb-retrieve-result').innerHTML = '<div class="text-sm text-slate-400">检索中...</div>';
            const res = await fetch(`${API_BASE}/api/kb/retrieve`, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({query_text: query, query_features: features, top_k: topK, request_id: 'frontend_retrieve_' + Date.now(), session_id: 'frontend_retrieve'})
            });
            const data = await res.json();
            document.getElementById('kb-retrieve-result').innerHTML = `
                <div class="bg-white border rounded p-4">
                    <div class="flex gap-2 flex-wrap text-xs mb-3">
                        <span class="px-2 py-1 rounded bg-slate-100">状态 ${safeText(data.status)}</span>
                        <span class="px-2 py-1 rounded bg-slate-100">置信 ${safeText(data.confidence_score)}</span>
                        <span class="px-2 py-1 rounded ${data.manual_review_required ? 'bg-rose-100 text-rose-700' : 'bg-emerald-100 text-emerald-700'}">人工复核 ${safeText(data.manual_review_required)}</span>
                        <span class="px-2 py-1 rounded bg-slate-100">耗时 ${safeText(data.latency_ms)}ms</span>
                    </div>
                    <div class="space-y-3">${(data.hits || []).map(hit => `
                        <div class="border rounded p-3 text-xs">
                            <div class="font-bold">${safeText(hit.title)} <span class="text-slate-400">score ${safeText(hit.score)}</span></div>
                            <div class="text-slate-500 mt-1">${safeText(hit.knowledge_type_label)} · ${safeText(hit.business_line_label)} · ${safeText(hit.language_pair_label)} · ${safeText(hit.service_scope_label)}</div>
                            <div class="mt-2 whitespace-pre-wrap">${safeText(hit.content)}</div>
                            ${hit.pricing_rules && hit.pricing_rules.length ? `<pre class="mt-2 bg-emerald-50 border rounded p-2 overflow-auto">${safeText(JSON.stringify(hit.pricing_rules, null, 2))}</pre>` : ''}
                        </div>`).join('') || '<div class="text-slate-400 text-sm">无命中</div>'}</div>
                    <pre class="mt-4 bg-slate-900 text-slate-100 text-xs p-3 rounded overflow-auto max-h-80">${safeText(JSON.stringify(data.filters_used, null, 2))}</pre>
                </div>`;
        }

        async function loadKbQuality() {
            const res = await fetch(`${API_BASE}/api/kb/quality/report?days=30&limit=300`);
            const data = await res.json();
            const issues = data.issues || [];
            document.getElementById('kb-body').innerHTML = `
                <div class="h-full overflow-y-auto p-4 bg-slate-50">
                    <div class="grid grid-cols-4 gap-3 mb-4">
                        <div class="bg-white border rounded p-3"><div class="text-xs text-slate-500">问题总数</div><div class="text-2xl font-bold">${safeText(data.total_issues)}</div></div>
                        <div class="bg-white border rounded p-3"><div class="text-xs text-slate-500">高风险</div><div class="text-2xl font-bold text-rose-600">${safeText((data.by_severity || {}).high || 0)}</div></div>
                        <div class="bg-white border rounded p-3"><div class="text-xs text-slate-500">中风险</div><div class="text-2xl font-bold text-amber-600">${safeText((data.by_severity || {}).medium || 0)}</div></div>
                        <div class="bg-white border rounded p-3"><div class="text-xs text-slate-500">窗口</div><div class="text-2xl font-bold">${safeText(data.window_days)}天</div></div>
                    </div>
                    <div class="bg-white border rounded overflow-hidden">
                        <table class="w-full text-xs">
                            <thead class="bg-slate-100"><tr><th class="text-left p-2">等级</th><th class="text-left p-2">类型</th><th class="text-left p-2">标题/范围</th><th class="text-left p-2">说明</th></tr></thead>
                            <tbody>${issues.map(issue => `
                                <tr class="border-t">
                                    <td class="p-2">${safeText(issue.severity)}</td>
                                    <td class="p-2 font-medium">${safeText(issue.type)}</td>
                                    <td class="p-2">${safeText(issue.title || JSON.stringify(issue.scope || {}))}</td>
                                    <td class="p-2">${safeText(issue.message)}</td>
                                </tr>`).join('')}</tbody>
                        </table>
                    </div>
                </div>`;
        }

        async function loadKbRegression() {
            const res = await fetch(`${API_BASE}/api/kb/regression_cases`);
            const data = await res.json();
            document.getElementById('kb-body').innerHTML = `
                <div class="h-full overflow-y-auto p-4 bg-slate-50">
                    <div class="mb-3 flex items-center gap-2">
                        <button onclick="runKbRegression()" class="px-4 py-2 bg-emerald-600 text-white rounded text-sm">执行20题回归</button>
                        <label class="text-xs text-slate-500"><input id="kb-reg-keep-logs" type="checkbox" class="align-middle mr-1">保留命中日志</label>
                    </div>
                    <div class="bg-white border rounded overflow-hidden mb-4">
                        <table class="w-full text-xs">
                            <thead class="bg-slate-100"><tr><th class="text-left p-2">编号</th><th class="text-left p-2">类别</th><th class="text-left p-2">问题</th></tr></thead>
                            <tbody>${(data.cases || []).map(item => `<tr class="border-t"><td class="p-2 font-medium">${safeText(item.case_id)}</td><td class="p-2">${safeText(item.category)}</td><td class="p-2">${safeText(item.query_text)}</td></tr>`).join('')}</tbody>
                        </table>
                    </div>
                    <pre id="kb-regression-result" class="bg-slate-900 text-slate-100 text-xs p-3 rounded overflow-auto max-h-[420px]"></pre>
                </div>`;
        }

        async function runKbRegression() {
            const keepLogs = document.getElementById('kb-reg-keep-logs')?.checked;
            const target = document.getElementById('kb-regression-result');
            target.textContent = 'running...';
            const res = await fetch(`${API_BASE}/api/kb/regression_cases/run`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({top_k: 5, cleanup_logs: !keepLogs, include_hits: false})
            });
            const data = await res.json();
            target.textContent = JSON.stringify(data, null, 2);
        }

        async function loadKbOps() {
            const [healthRes, perfRes] = await Promise.all([
                fetch(`${API_BASE}/api/health/ready`),
                fetch(`${API_BASE}/api/kb/performance/status`)
            ]);
            const health = await healthRes.json();
            const perf = await perfRes.json();
            document.getElementById('kb-body').innerHTML = `
                <div class="h-full overflow-y-auto p-4 bg-slate-50">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white border rounded p-4">
                            <h3 class="font-bold text-slate-800 mb-3">健康检查</h3>
                            <pre class="text-xs bg-slate-50 border rounded p-3 overflow-auto max-h-[520px]">${safeText(JSON.stringify(health, null, 2))}</pre>
                        </div>
                        <div class="bg-white border rounded p-4">
                            <h3 class="font-bold text-slate-800 mb-3">检索性能</h3>
                            <pre class="text-xs bg-slate-50 border rounded p-3 overflow-auto max-h-[520px]">${safeText(JSON.stringify(perf, null, 2))}</pre>
                        </div>
                    </div>
                </div>`;
        }

        fetchSessions();
    </script>
</body>
</html>
