<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>客户套装邮件生成</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --line: #dbe3ef;
      --text: #172033;
      --muted: #64748b;
      --brand: #4f46e5;
      --good: #059669;
      --warn: #b45309;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; }
    [hidden] { display: none !important; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.6 Arial, "Microsoft YaHei", sans-serif;
    }
    .appbar {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      padding: 8px 20px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .appbar-tools {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1 1 auto;
      flex-wrap: wrap;
      min-width: 0;
    }
    .recipients-box {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1 1 360px;
      min-width: 220px;
    }
    .recipients-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }
    .recipients-box input {
      flex: 1 1 auto;
      min-width: 0;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 7px 9px;
      font: inherit;
      font-size: 13px;
    }
    .recipients-box input:focus { border-color: var(--brand); outline: none; }
    .suite-picker {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .suite-picker-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
    }
    .suite-picker select {
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 7px 9px;
      font: inherit;
      font-size: 13px;
      background: #fff;
      cursor: pointer;
      max-width: 220px;
    }
    .suite-picker select:focus { border-color: var(--brand); outline: none; }
    .suite-picker select:disabled { background: #f1f5f9; cursor: progress; }
    .send-box {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }
    .send-box .steps-text {
      font-size: 13px;
      font-weight: 700;
      color: #0f172a;
    }
    .brand {
      font-weight: 900;
      font-size: 16px;
      color: #0f172a;
    }
    .brand small {
      margin-left: 10px;
      color: var(--muted);
      font-weight: 700;
      font-size: 12px;
    }
    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 24px auto 48px;
    }
    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
    }
    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      background: #eef2ff;
      color: #3730a3;
      font-weight: 700;
      font-size: 12px;
      white-space: nowrap;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      margin-top: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px 18px;
    }
    .kv b {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 2px;
    }
    code {
      font-family: Consolas, monospace;
      font-size: 12px;
    }
    .status {
      padding: 12px 14px;
      border-radius: 8px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status.error {
      background: #fef2f2;
      border-color: #fecaca;
      color: var(--bad);
    }
    details.mail {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-top: 14px;
      overflow: hidden;
    }
    details.mail summary {
      cursor: pointer;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
    }
    summary::-webkit-details-marker { display: none; }
    .step-title {
      font-weight: 800;
    }
    .meta-line {
      color: var(--muted);
      font-size: 12px;
    }
    .mail-body {
      padding: 14px;
    }
    .subject {
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 10px;
    }
    .body-html {
      border: 1px solid #e2e8f0;
      background: #fff;
      border-radius: 6px;
      padding: 12px;
      min-height: 120px;
    }
    .body-html p {
      margin: 0 0 10px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    button {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #0f172a;
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
      font-weight: 700;
    }
    button.primary {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    textarea {
      width: 100%;
      min-height: 78px;
      resize: vertical;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 8px;
      font: inherit;
    }
    .feedback {
      margin-top: 14px;
      border-top: 1px solid #e2e8f0;
      padding-top: 12px;
    }
    .feedback-status {
      color: var(--muted);
      font-size: 12px;
    }
    .feedback-status.ok { color: var(--good); font-weight: 700; }
    .feedback-status.err { color: var(--bad); font-weight: 700; }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font: 12px/1.5 Consolas, monospace;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #bfdbfe;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      flex: 0 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .include-toggle {
      display: inline-flex;
      align-items: center;
      cursor: pointer;
    }
    .include-toggle input {
      width: 17px;
      height: 17px;
      cursor: pointer;
    }
    .summary-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    details.mail.skipped {
      opacity: .5;
    }
    .field-label {
      font-weight: 700;
      color: var(--muted);
      font-size: 12px;
      margin: 12px 0 4px;
    }
    .subject-input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 9px;
      font: inherit;
      font-weight: 700;
    }
    .subject-input:focus { border-color: var(--brand); outline: none; }
    .rte-toolbar {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }
    .rte-toolbar button {
      padding: 4px 9px;
      font-size: 13px;
      line-height: 1.2;
    }
    .rte-toolbar select {
      height: 28px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
      padding: 0 4px;
      cursor: pointer;
    }
    .rte-color {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 2px 5px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
    }
    .rte-color input[type=color] {
      width: 18px;
      height: 18px;
      border: none;
      padding: 0;
      background: none;
      cursor: pointer;
    }
    .rte-sep {
      width: 1px;
      align-self: stretch;
      background: #e2e8f0;
      margin: 2px 2px;
    }
    .body-html.rte {
      min-height: 170px;
      outline: none;
    }
    .body-html.rte:focus { border-color: var(--brand); }
    .send-config { margin-top: 14px; }
    .send-config-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .interval-input {
      width: 72px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 7px 8px;
      font: inherit;
    }
    .time-input {
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 7px 8px;
      font: inherit;
    }
    .hint {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #e2e8f0;
      color: #475569;
      font-size: 11px;
      font-weight: 800;
      cursor: help;
      user-select: none;
    }
    .feedback.no-divider {
      border-top: none;
      padding-top: 0;
    }
    @media (max-width: 760px) {
      main { width: calc(100vw - 20px); margin-top: 14px; }
      .top { display: block; }
      .badge { margin-top: 10px; }
      .grid { grid-template-columns: 1fr; }
      details.mail summary { display: block; }
    }
  </style>
</head>
<body>
  <header class="appbar">
    <div class="brand">智能销售辅助工作台<small>邮件套装生成</small></div>
    <div class="appbar-tools">
      <label class="suite-picker">
        <span class="suite-picker-label">套装场景</span>
        <select id="suite-scenario" onchange="onSuiteScenarioChange(this.value)" disabled>
          <option value="">自动判断中…</option>
        </select>
      </label>
      <label class="recipients-box">
        <span class="recipients-label">客户邮箱</span>
        <input type="text" id="recipient-emails" placeholder="加载中…" onblur="saveRecipientEmails()">
      </label>
      <div class="send-box">
        <span id="suite-steps-text" class="steps-text">当前未勾选</span>
        <button type="button" class="primary" id="suite-send-btn" onclick="sendSuite()">发送</button>
        <span id="send-status" class="feedback-status"></span>
      </div>
    </div>
    <div class="badge">免登录独立页</div>
  </header>
  <main>
    <div class="top" hidden>
      <div>
        <h1>客户套装邮件生成</h1>
        <div class="sub">根据 URL 参数 <code>id</code> 读取 CRM 客户画像，自动判断场景并生成 4 封套装草稿。</div>
      </div>
      <div id="page-badge" class="badge">等待客户编号</div>
    </div>

    <div id="status" class="status"><span class="spinner"></span><span id="status-text">正在读取参数...</span></div>

    <section id="customer-panel" class="panel" hidden>
      <h2 style="margin:0 0 10px;font-size:16px;">客户信息</h2>
      <div id="customer-grid" class="grid"></div>
    </section>

    <section id="drafts-panel" hidden></section>
  </main>

  <script>
    let suiteData = null;
    let currentId = '';
    // 已生成套装缓存: scenario -> 接口返回数据. 计算过的场景直接读取,不再重新调大模型.
    const suiteCache = {};
    // 3 个可选套装场景,与后端 _MAIL_SCENARIO_CHINESE 一致.
    const SUITE_SCENARIOS = [
      { value: 're_activation', label: '老客户激活' },
      { value: 'new_business_promotion', label: '老客户其他业务介绍' },
      { value: 'new_contact_intro', label: '新客户开发介绍' },
    ];

    const esc = (v) => String(v == null || v === '' ? '-' : v)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');

    function htmlToText(html) {
      const div = document.createElement('div');
      div.innerHTML = html || '';
      return div.innerText.trim();
    }

    function setStatus(text, error) {
      const el = document.getElementById('status');
      const textEl = document.getElementById('status-text');
      if (textEl) textEl.textContent = text;
      el.className = error ? 'status error' : 'status';
      const spinner = el.querySelector('.spinner');
      if (spinner) spinner.style.display = error || text.includes('完成') || text.includes('已读取') ? 'none' : 'inline-block';
    }

    function field(label, value) {
      return `<div class="kv"><b>${esc(label)}</b><span>${esc(value)}</span></div>`;
    }

    function scenarioLabel(data) {
      return data.scenario_label_cn || data.scenario_label || data.scenario || '';
    }

    function maskText(value, options = {}) {
      const text = String(value || '').trim();
      if (!text) return '';
      const keepStart = options.keepStart ?? 1;
      const keepEnd = options.keepEnd ?? 1;
      if (text.length <= keepStart + keepEnd + 1) {
        return `${text.slice(0, 1)}***`;
      }
      return `${text.slice(0, keepStart)}***${text.slice(text.length - keepEnd)}`;
    }

    function maskCustomerId(value) {
      const text = String(value || '').trim();
      if (!text) return '';
      const parts = text.split('-');
      if (parts.length >= 2) {
        return `${parts[0].slice(0, 2)}***-${parts[parts.length - 1]}`;
      }
      return maskText(text, { keepStart: 2, keepEnd: 2 });
    }

    function maskCompanyName(value) {
      const text = String(value || '').trim();
      if (!text) return '';
      if (text.length <= 8) return maskText(text, { keepStart: 2, keepEnd: 1 });
      return `${text.slice(0, 4)}***${text.slice(-4)}`;
    }

    function renderCustomer(data) {
      const profile = data.customer_profile || {};
      const contactName = profile.crm_contact_name || profile.contact_name || '';
      document.getElementById('page-badge').textContent = `客户 ${maskCustomerId(data.customer_id)}`;
      document.getElementById('customer-grid').innerHTML = [
        field('客户编号', maskCustomerId(data.customer_id)),
        field('公司名称', maskCompanyName(profile.company_name)),
        field('联系人', maskText(contactName, { keepStart: 1, keepEnd: 0 })),
        field('收件方式', '仅生成模板，不发邮件'),
        field('自动判断场景', `${scenarioLabel(data)} (${data.scenario})`),
      ].join('');
      document.getElementById('customer-panel').hidden = false;
    }

    function renderDrafts(data) {
      const wrap = document.getElementById('drafts-panel');
      wrap.hidden = false;
      wrap.innerHTML = '';
      for (const item of data.drafts || []) {
        const settings = item.send_settings || {};
        const included = settings.included !== false;
        const interval = settings.send_interval_days != null ? settings.send_interval_days : (settings.default_send_interval_days || 0);
        const sendTime = settings.send_time || settings.default_send_time || '09:00';
        const includeTip = '勾上才会发这封；取消勾选就跳过这一封，其他勾着的照常发。';
        const intervalTip = '填 0 就是今天发；填几就是从今天起再过几个自然日发，比如填 5 就是 5 天后发。右边是当天几点几分发。';
        const checkboxHtml = `
          <label class="include-toggle" title="${esc(includeTip)}" onclick="event.stopPropagation()">
            <input type="checkbox" id="include-${esc(item.suite_step)}" ${included ? 'checked' : ''} onchange="saveInclude(${esc(item.suite_step)})">
          </label>`;

        if (item.status !== 'success' || !item.draft) {
          const details = document.createElement('details');
          details.className = 'mail' + (included ? '' : ' skipped');
          details.open = true;
          details.innerHTML = `
            <summary>
              <div class="summary-left">
                ${checkboxHtml}
                <div>
                  <div class="step-title">第 ${esc(item.suite_step)} 封 · ${esc(scenarioLabel(data))}</div>
                  <div class="meta-line">生成失败 · ${esc(item.step_label_cn)}</div>
                </div>
              </div>
              <div class="meta-line">默认展开</div>
            </summary>
            <div class="mail-body">
              <div class="status error">这封草稿没有生成成功：${esc(item.error || '未知错误')}</div>
            </div>
          `;
          wrap.appendChild(details);
          continue;
        }
        const draft = item.draft || {};
        const details = document.createElement('details');
        details.className = 'mail' + (included ? '' : ' skipped');
        details.open = true;
        details.innerHTML = `
          <summary>
            <div class="summary-left">
              ${checkboxHtml}
              <div class="step-title">第 ${esc(item.suite_step)} 封 · ${esc(scenarioLabel(data))}</div>
            </div>
            <div class="meta-line">默认展开</div>
          </summary>
          <div class="mail-body">
            <div class="field-label">邮件主题</div>
            <input type="text" id="subject-${esc(item.suite_step)}" class="subject-input" value="${esc(draft.final_subject)}" onblur="saveDraftField(${esc(item.suite_step)})">
            <div class="field-label">邮件正文</div>
            <div class="rte-toolbar">
              <button type="button" title="撤销" onmousedown="rteCmd(event,'undo')">↶</button>
              <button type="button" title="重做" onmousedown="rteCmd(event,'redo')">↷</button>
              <span class="rte-sep"></span>
              <select title="字体" onchange="rteExec('fontName', this.value); this.selectedIndex=0">
                <option value="">字体</option>
                <option value="Microsoft YaHei">微软雅黑</option>
                <option value="SimSun">宋体</option>
                <option value="SimHei">黑体</option>
                <option value="KaiTi">楷体</option>
                <option value="Arial">Arial</option>
                <option value="Times New Roman">Times New Roman</option>
              </select>
              <select title="字号" onchange="rteExec('fontSize', this.value); this.selectedIndex=0">
                <option value="">字号</option>
                <option value="1">小</option>
                <option value="2">较小</option>
                <option value="3">正常</option>
                <option value="4">较大</option>
                <option value="5">大</option>
                <option value="6">特大</option>
                <option value="7">超大</option>
              </select>
              <select title="段落" onchange="rteExec('formatBlock', this.value); this.selectedIndex=0">
                <option value="">段落</option>
                <option value="p">正文</option>
                <option value="h1">标题1</option>
                <option value="h2">标题2</option>
                <option value="h3">标题3</option>
              </select>
              <span class="rte-sep"></span>
              <button type="button" title="加粗" onmousedown="rteCmd(event,'bold')"><b>B</b></button>
              <button type="button" title="斜体" onmousedown="rteCmd(event,'italic')"><i>I</i></button>
              <button type="button" title="下划线" onmousedown="rteCmd(event,'underline')"><u>U</u></button>
              <button type="button" title="删除线" onmousedown="rteCmd(event,'strikeThrough')"><s>S</s></button>
              <label class="rte-color" title="字体颜色">A<input type="color" onchange="rteExec('foreColor', this.value)"></label>
              <label class="rte-color" title="背景色">底<input type="color" onchange="rteHilite(this.value)"></label>
              <span class="rte-sep"></span>
              <button type="button" title="无序列表" onmousedown="rteCmd(event,'insertUnorderedList')">• 列表</button>
              <button type="button" title="有序列表" onmousedown="rteCmd(event,'insertOrderedList')">1. 列表</button>
              <button type="button" title="减少缩进" onmousedown="rteCmd(event,'outdent')">⇤</button>
              <button type="button" title="增加缩进" onmousedown="rteCmd(event,'indent')">⇥</button>
              <button type="button" title="左对齐" onmousedown="rteCmd(event,'justifyLeft')">左</button>
              <button type="button" title="居中对齐" onmousedown="rteCmd(event,'justifyCenter')">中</button>
              <button type="button" title="右对齐" onmousedown="rteCmd(event,'justifyRight')">右</button>
              <span class="rte-sep"></span>
              <button type="button" title="上标" onmousedown="rteCmd(event,'superscript')">x²</button>
              <button type="button" title="下标" onmousedown="rteCmd(event,'subscript')">x₂</button>
              <button type="button" title="插入链接" onmousedown="rteLink(event)" hidden>链接</button>
              <button type="button" title="插入图片" onmousedown="rteImage(event)" hidden>图片</button>
              <button type="button" title="分割线" onmousedown="rteCmd(event,'insertHorizontalRule')">―</button>
              <button type="button" title="清除格式" onmousedown="rteCmd(event,'removeFormat')">清除格式</button>
            </div>
            <div id="body-${esc(item.suite_step)}" class="body-html rte" contenteditable="true" onblur="saveDraftField(${esc(item.suite_step)})">${draft.final_body_html || ''}</div>
            <div class="send-config">
              <div class="field-label">发送间隔</div>
              <div class="send-config-row">
                <span>距今天</span>
                <input type="number" min="0" id="interval-${esc(item.suite_step)}" class="interval-input" value="${esc(interval)}" onblur="saveDraftField(${esc(item.suite_step)})">
                <span>天后的</span>
                <input type="time" id="sendtime-${esc(item.suite_step)}" class="time-input" value="${esc(sendTime)}" onblur="saveDraftField(${esc(item.suite_step)})">
                <span>发送</span>
                <span class="hint" title="${esc(intervalTip)}">?</span>
              </div>
              <div id="draft-status-${esc(item.suite_step)}" class="feedback-status" style="margin-top:6px;"></div>
            </div>
            <div class="feedback no-divider" style="margin-top:14px;">
              <div style="font-weight:800;margin-bottom:6px;">反馈</div>
              <textarea id="feedback-${esc(item.suite_step)}" placeholder="填写这封邮件的问题、修改意见或是否可用。每次保存都会新建一条反馈记录。"></textarea>
              <div class="actions">
                <button id="save-${esc(item.suite_step)}" class="primary" type="button" onclick="saveFeedback(${esc(item.suite_step)})">保存反馈</button>
                <span id="feedback-status-${esc(item.suite_step)}" class="feedback-status">尚未保存</span>
              </div>
            </div>
          </div>
        `;
        wrap.appendChild(details);
      }
    }

    // 富文本编辑：保存/恢复选区，保证点击下拉、取色器等控件后仍能作用到原选区
    let rteSavedRange = null;
    document.addEventListener('selectionchange', () => {
      const sel = window.getSelection();
      if (!sel || !sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      let node = range.commonAncestorContainer;
      if (node.nodeType === 3) node = node.parentElement;
      if (node && node.closest && node.closest('.rte')) {
        rteSavedRange = range.cloneRange();
      }
    });

    function rteRestore() {
      if (!rteSavedRange) return;
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(rteSavedRange);
    }

    function rteExec(cmd, value) {
      rteRestore();
      document.execCommand(cmd, false, value == null ? null : value);
    }

    function rteCmd(event, cmd, value) {
      event.preventDefault();
      document.execCommand(cmd, false, value == null ? null : value);
    }

    function rteHilite(color) {
      rteRestore();
      if (!document.execCommand('hiliteColor', false, color)) {
        document.execCommand('backColor', false, color);
      }
    }

    function rteLink(event) {
      event.preventDefault();
      const url = prompt('请输入链接地址（含 http:// 或 https://）');
      if (url) rteExec('createLink', url);
    }

    function rteImage(event) {
      event.preventDefault();
      const url = prompt('请输入图片地址（含 http:// 或 https://）');
      if (url) rteExec('insertImage', url);
    }

    function readDraftFields(step) {
      const subjectEl = document.getElementById(`subject-${step}`);
      const bodyEl = document.getElementById(`body-${step}`);
      const intervalEl = document.getElementById(`interval-${step}`);
      const timeEl = document.getElementById(`sendtime-${step}`);
      const fields = {};
      if (subjectEl) fields.subject = subjectEl.value;
      if (bodyEl) fields.body_html = bodyEl.innerHTML;
      if (intervalEl && intervalEl.value !== '') fields.send_interval_days = Number(intervalEl.value);
      if (timeEl && timeEl.value) fields.send_time = timeEl.value;
      return fields;
    }

    async function postDraftEdit(step, extra, okMsg) {
      const status = document.getElementById(`draft-status-${step}`);
      if (status) { status.textContent = '保存中...'; status.className = 'feedback-status'; }
      try {
        const resp = await fetch('/api/v1/mail/customer-suite-draft', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            customer_id: suiteData.customer_id,
            scenario: suiteData.scenario,
            suite_step: Number(step),
            ...extra,
          }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
        if (status) { status.textContent = okMsg; status.className = 'feedback-status ok'; }
        return data;
      } catch (err) {
        if (status) { status.textContent = `保存失败：${err.message}`; status.className = 'feedback-status err'; }
        return null;
      }
    }

    async function saveDraftField(step) {
      const item = (suiteData.drafts || []).find(x => Number(x.suite_step) === Number(step));
      if (!item) return;
      const draft = item.draft || {};
      const fields = readDraftFields(step);
      const ok = await postDraftEdit(step, { mail_uid: draft.mail_uid, ...fields }, '已保存');
      if (ok) {
        if (fields.subject !== undefined) draft.final_subject = fields.subject;
        if (fields.body_html !== undefined) draft.final_body_html = fields.body_html;
        if (fields.send_interval_days !== undefined && item.send_settings) item.send_settings.send_interval_days = fields.send_interval_days;
        if (fields.send_time !== undefined && item.send_settings) item.send_settings.send_time = fields.send_time;
      }
    }

    async function saveInclude(step) {
      const cb = document.getElementById(`include-${step}`);
      const included = cb ? cb.checked : true;
      const details = cb && cb.closest('details');
      if (details) details.classList.toggle('skipped', !included);
      const item = (suiteData.drafts || []).find(x => Number(x.suite_step) === Number(step));
      if (item && item.send_settings) item.send_settings.included = included;
      updateSuiteStepsText();
      await postDraftEdit(step, { included }, included ? '已勾选，这封会发送' : '已取消勾选，这封跳过不发');
    }

    function checkedSuiteSteps() {
      return (suiteData && suiteData.drafts || [])
        .map(it => Number(it.suite_step))
        .filter(step => {
          const cb = document.getElementById(`include-${step}`);
          return cb ? cb.checked : false;
        })
        .sort((a, b) => a - b);
    }

    function updateSuiteStepsText() {
      const el = document.getElementById('suite-steps-text');
      if (!el) return;
      const steps = checkedSuiteSteps();
      el.textContent = steps.length
        ? `当前以 ${steps.join(',')} 作为套装`
        : '当前未勾选任何邮件';
    }

    function fillRecipientEmails() {
      const input = document.getElementById('recipient-emails');
      if (!input || !suiteData) return;
      input.value = (suiteData.recipient_emails || []).join(', ');
      input.placeholder = (suiteData.recipient_emails || []).length ? '' : '未读取到有效客户邮箱';
    }

    async function saveRecipientEmails() {
      const input = document.getElementById('recipient-emails');
      const status = document.getElementById('send-status');
      if (!input || !suiteData) return;
      try {
        const resp = await fetch('/api/v1/mail/customer-suite-recipient', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            customer_id: suiteData.customer_id,
            scenario: suiteData.scenario,
            emails: input.value || '',
          }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
        suiteData.recipient_emails = data.emails || [];
        if (status) { status.textContent = `客户邮箱已保存(${(data.emails || []).length})`; status.className = 'feedback-status ok'; }
      } catch (err) {
        if (status) { status.textContent = `邮箱保存失败：${err.message}`; status.className = 'feedback-status err'; }
      }
    }

    async function sendSuite() {
      const status = document.getElementById('send-status');
      const btn = document.getElementById('suite-send-btn');
      const input = document.getElementById('recipient-emails');
      if (!suiteData) return;
      const steps = checkedSuiteSteps();
      if (!steps.length) {
        if (status) { status.textContent = '请先勾选要发送的邮件'; status.className = 'feedback-status err'; }
        return;
      }
      const emails = (input && input.value || '').split(/[,;\s]+/).filter(Boolean);
      if (!emails.length) {
        if (status) { status.textContent = '请先填写客户邮箱'; status.className = 'feedback-status err'; }
        return;
      }
      if (!confirm(`【真实发送】将把第 ${steps.join(',')} 封写入发送队列，由系统按计划时间真实发出。\n收件人：\n${emails.join(', ')}\n\n请确认收件人无误，确认发送？`)) return;
      // 带上页面当前显示/编辑后的每封内容，后端直接用，不再调大模型重生成(避免覆盖你的编辑)
      const draftsPayload = steps.map(s => {
        const subjEl = document.getElementById(`subject-${s}`);
        const bodyEl = document.getElementById(`body-${s}`);
        return {
          suite_step: s,
          subject: subjEl ? subjEl.value : '',
          body_html: bodyEl ? bodyEl.innerHTML : '',
        };
      });
      btn.disabled = true;
      if (status) { status.textContent = '处理中…'; status.className = 'feedback-status'; }
      try {
        const resp = await fetch('/api/v1/mail/customer-suite-send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            customer_id: suiteData.customer_id,
            scenario: suiteData.scenario,
            suite_steps: steps,
            recipient_emails: input ? input.value : '',
            drafts: draftsPayload,
          }),
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
        const lines = (data.prepared || []).map(p => `第${p.suite_step}封 · ${p.plan_send_time} · ${p.status}${p.error ? '（' + p.error + '）' : ''}`).join('\n');
        const enq = data.enqueued_count != null ? data.enqueued_count : data.prepared_count;
        if (status) {
          status.textContent = `已入队 ${enq}/${data.prepared_count} 封`;
          status.className = (enq === data.prepared_count) ? 'feedback-status ok' : 'feedback-status err';
        }
        alert(`已写入发送队列 ${enq}/${data.prepared_count} 封\n发件人：${data.sender_email}\n收件人：${(data.recipient_emails || []).join(', ')}\n\n${lines}\n\n${data.note || ''}`);
      } catch (err) {
        if (status) { status.textContent = `发送失败：${err.message}`; status.className = 'feedback-status err'; }
      } finally {
        btn.disabled = false;
      }
    }

    async function copyMail(step, includeSubject) {
      const item = (suiteData.drafts || []).find(x => Number(x.suite_step) === Number(step));
      if (!item) return;
      const draft = item.draft || {};
      const text = includeSubject
        ? `主题：${draft.final_subject || ''}\n\n${htmlToText(draft.final_body_html)}`
        : htmlToText(draft.final_body_html);
      await navigator.clipboard.writeText(text);
      const el = document.getElementById(`feedback-status-${step}`);
      if (el) {
        el.textContent = '已复制';
        el.className = 'feedback-status ok';
      }
    }

    async function saveFeedback(step) {
      const item = (suiteData.drafts || []).find(x => Number(x.suite_step) === Number(step));
      if (!item) return;
      const draft = item.draft || {};
      const input = document.getElementById(`feedback-${step}`);
      const btn = document.getElementById(`save-${step}`);
      const status = document.getElementById(`feedback-status-${step}`);
      const feedback = (input.value || '').trim();
      if (!feedback) {
        status.textContent = '请先填写反馈';
        status.className = 'feedback-status err';
        return;
      }
      btn.disabled = true;
      status.textContent = '保存中...';
      status.className = 'feedback-status';
      try {
        const resp = await fetch('/api/v1/mail/customer-suite-feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            customer_id: suiteData.customer_id,
            contact_email: (suiteData.customer_profile || {}).contact_email,
            company_name: (suiteData.customer_profile || {}).company_name,
            scenario: suiteData.scenario,
            suite_step: Number(step),
            mail_uid: draft.mail_uid,
            final_subject: draft.final_subject,
            final_body_html: draft.final_body_html,
            feedback_text: feedback,
            draft_payload: draft,
            customer_profile: suiteData.customer_profile || {}
          })
        });
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
        status.textContent = `已保存：${data.feedback_id}`;
        status.className = 'feedback-status ok';
        input.value = '';
      } catch (err) {
        status.textContent = `保存失败：${err.message}`;
        status.className = 'feedback-status err';
      } finally {
        btn.disabled = false;
      }
    }

    function buildSuitePicker() {
      const sel = document.getElementById('suite-scenario');
      if (!sel) return;
      sel.innerHTML = SUITE_SCENARIOS
        .map((s) => `<option value="${esc(s.value)}">${esc(s.label)}</option>`)
        .join('');
    }

    function syncSuitePicker(scenario) {
      const sel = document.getElementById('suite-scenario');
      if (!sel) return;
      if (scenario && SUITE_SCENARIOS.some((s) => s.value === scenario)) {
        sel.value = scenario;
      }
      sel.disabled = false;
    }

    // 拉取套装数据: 指定场景且已缓存则直接读取, 否则请求后端(默认场景传空走自动判断).
    async function fetchSuite(id, scenario) {
      if (scenario && suiteCache[scenario]) return suiteCache[scenario];
      const url = scenario
        ? `/api/v1/mail/customer-suite?id=${encodeURIComponent(id)}&scenario=${encodeURIComponent(scenario)}`
        : `/api/v1/mail/customer-suite?id=${encodeURIComponent(id)}`;
      const resp = await fetch(url);
      const data = await resp.json().catch(() => ({}));
      if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
      if (data.scenario) suiteCache[data.scenario] = data;
      return data;
    }

    function renderSuite(data) {
      suiteData = data;
      renderCustomer(data);
      renderDrafts(data);
      fillRecipientEmails();
      updateSuiteStepsText();
      syncSuitePicker(data.scenario);
    }

    async function onSuiteScenarioChange(scenario) {
      if (!currentId || !scenario) return;
      const sel = document.getElementById('suite-scenario');
      const label = (SUITE_SCENARIOS.find((s) => s.value === scenario) || {}).label || scenario;
      const cached = !!suiteCache[scenario];
      if (sel) sel.disabled = true;
      setStatus(cached ? `读取已生成套装：${label}` : `正在按场景重新生成 4 封套装邮件：${label}`);
      try {
        const data = await fetchSuite(currentId, scenario);
        renderSuite(data);
        setStatus(`${cached ? '已读取缓存' : '生成完成'}：${scenarioLabel(data)} · 共 ${(data.drafts || []).length} 封 · 真发开关关闭`);
      } catch (err) {
        setStatus(`切换场景失败：${err.message}`, true);
        if (sel) {
          sel.disabled = false;
          syncSuitePicker(suiteData && suiteData.scenario);
        }
      }
    }

    async function loadSuite() {
      const params = new URLSearchParams(window.location.search);
      const id = (params.get('id') || '').trim();
      if (!id) {
        setStatus('URL 缺少客户编号参数，例如 /static/mail-suite.html?id=KH23447-001', true);
        return;
      }
      currentId = id;
      buildSuitePicker();
      document.getElementById('page-badge').textContent = `客户 ${id}`;
      setStatus(`正在读取 CRM 并生成 4 封套装邮件：${id}`);
      try {
        // 默认不传场景: 走后端自动判断场景.
        const data = await fetchSuite(id, '');
        setStatus(`生成完成：${scenarioLabel(data)} · 共 ${(data.drafts || []).length} 封 · 真发开关关闭`);
        renderSuite(data);
      } catch (err) {
        setStatus(`加载失败：${err.message}`, true);
      }
    }

    loadSuite();
  </script>
</body>
</html>
